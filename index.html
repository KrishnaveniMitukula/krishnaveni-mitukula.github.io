<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Krishnaveni Mitukula</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  background:#050508;
  overflow:hidden;
  position:relative;
}

/* Dark starfield canvas background */
canvas{position:fixed;inset:0;z-index:0;}

/* Dark nebula orbs */
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:1;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#0d1f3c,transparent);top:-150px;left:-150px;opacity:0.9;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#1a0a2e,transparent);bottom:-100px;right:-100px;opacity:0.9;}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#0a1628,transparent);top:30%;right:5%;opacity:0.7;animation:floatOrb 9s ease-in-out infinite;}

@keyframes floatOrb{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-25px);}
}

/* Glassmorphism card */
.card{
  position:relative;z-index:10;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  padding:48px 44px 42px;
  width:min(400px,92vw);
  text-align:center;
  box-shadow:0 0 0 1px rgba(255,255,255,0.05),0 40px 100px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.07);
  animation:cardIn 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
  opacity:0;transform:translateY(50px) scale(0.94);
}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1);}}

/* Subtle top border glow */
.card::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(to right,transparent,rgba(120,180,255,0.5),transparent);
  border-radius:50%;
}

/* Photo */
.photo-wrap{position:relative;width:140px;height:140px;margin:0 auto 22px;}
.photo-ring{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(from 0deg,#4fc3f7,#7c4dff,#e040fb,#4fc3f7);
  animation:spin 5s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.photo-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:#050508;}
.photo-img{
  position:relative;z-index:2;width:140px;height:140px;
  border-radius:50%;object-fit:cover;object-position:top center;
  display:block;
  animation:photoIn 1.4s ease forwards;opacity:0;
}
@keyframes photoIn{0%{opacity:0;transform:scale(0.75);}100%{opacity:1;transform:scale(1);}}

.status{
  position:absolute;bottom:6px;right:6px;width:16px;height:16px;
  background:#00e676;border-radius:50%;border:2px solid #050508;z-index:3;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.5);}
  50%{box-shadow:0 0 0 8px rgba(0,230,118,0);}
}

.name{
  font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;
  color:#fff;letter-spacing:0.01em;margin-bottom:5px;
  animation:fadeUp 1s 0.4s ease forwards;opacity:0;transform:translateY(12px);
}
.name span{font-style:italic;font-weight:400;color:#7dd3fc;}

.role{
  font-size:0.72rem;color:rgba(255,255,255,0.45);letter-spacing:0.18em;
  text-transform:uppercase;margin-bottom:26px;
  animation:fadeUp 1s 0.55s ease forwards;opacity:0;transform:translateY(10px);
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

.line{
  width:50px;height:1px;margin:0 auto 26px;
  background:linear-gradient(to right,transparent,rgba(125,211,252,0.6),transparent);
  animation:fadeUp 1s 0.65s ease forwards;opacity:0;
}

/* Social icons row */
.socials{
  display:flex;justify-content:center;gap:16px;
  animation:fadeUp 1s 0.8s ease forwards;opacity:0;transform:translateY(12px);
}

.social-btn{
  width:60px;height:60px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;cursor:pointer;
  position:relative;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s,border-color 0.3s;
  overflow:hidden;
}
.social-btn img{width:32px;height:32px;object-fit:contain;position:relative;z-index:2;border-radius:6px;}
.social-btn::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 10px);left:50%;
  transform:translateX(-50%) translateY(5px);
  background:rgba(0,0,0,0.85);color:white;
  font-size:0.62rem;padding:4px 10px;border-radius:6px;
  white-space:nowrap;opacity:0;transition:all 0.2s;pointer-events:none;
  letter-spacing:0.05em;font-family:'Inter',sans-serif;
}
.social-btn:hover{transform:translateY(-8px) scale(1.15);border-color:rgba(255,255,255,0.25);box-shadow:0 16px 40px rgba(0,0,0,0.5);}
.social-btn:hover::after{opacity:1;transform:translateX(-50%) translateY(0);}

/* Individual icon brand backgrounds on hover */
.btn-github:hover{box-shadow:0 16px 40px rgba(0,0,0,0.5),0 0 20px rgba(255,255,255,0.1);}
.btn-instagram:hover{box-shadow:0 16px 40px rgba(225,48,108,0.3);}
.btn-whatsapp:hover{box-shadow:0 16px 40px rgba(37,211,102,0.3);}
.btn-linkedin:hover{box-shadow:0 16px 40px rgba(0,119,181,0.3);}

.footer-text{
  margin-top:26px;font-size:0.68rem;color:rgba(255,255,255,0.3);letter-spacing:0.12em;
  animation:fadeUp 1s 1s ease forwards;opacity:0;
}
</style>
</head>

<script>
// Starfield
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = Array.from({length:200}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  r: Math.random()*1.5,
  o: Math.random(),
  s: (Math.random()-0.5)*0.3
}));

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.o += s.s * 0.02;
    if(s.o>1||s.o<0) s.s*=-1;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.o})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
